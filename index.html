<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV口コミログ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">📺</div>
        <div>
          <div class="brand-title">TV口コミログ</div>
          <div class="brand-subtitle">放送回ごとのテレビ口コミ</div>
        </div>
      </div>
      <button class="small-button" id="resetButton">初期化</button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>前後1週間の全国ネット番組から口コミ。</h1>
      <p>番組名は候補から選択。表記ゆれを防ぎ、放送回ごとに平均評価・口コミ・いいね・ランキングを集計します。</p>
    </section>

    <nav class="main-tabs">
      <button class="tab active" data-view="schedule">番組表</button>
      <button class="tab" data-view="post">口コミを書く</button>
      <button class="tab" data-view="reviews">最新口コミ</button>
      <button class="tab" data-view="ranking">ランキング</button>
      <button class="tab" data-view="admin">番組追加</button>
    </nav>

    <section class="view" id="view-schedule">
      <div class="layout">
        <div class="card">
          <div class="section-head">
            <h2>番組表</h2>
            <span>前後1週間・主要全国ネット番組</span>
          </div>

          <nav class="sub-tabs">
            <button class="subtab active" data-schedule="now">📺 放送中</button>
            <button class="subtab" data-schedule="today">📅 今日</button>
            <button class="subtab" data-schedule="week">🗓 前後1週間</button>
          </nav>

          <div id="scheduleList" class="program-list"></div>
        </div>

        <aside>
          <div class="card">
            <h2>今夜の神回ランキング</h2>
            <div id="tonightRanking"></div>
          </div>
          <div class="card">
            <h2>口コミ数ランキング</h2>
            <div id="countRankingSide"></div>
          </div>
        </aside>
      </div>
    </section>

    <section class="view hidden" id="view-post">
      <div class="layout">
        <div class="card">
          <div class="section-head">
            <h2>口コミを書く</h2>
            <span>自由入力ではなく候補選択</span>
          </div>

          <div id="selectedBox" class="selected-box"></div>

          <label>番組を検索して選択</label>
          <input id="programSearch" placeholder="例：水曜日、情熱大陸、報道、イッテQ" autocomplete="off" />
          <div id="suggestions" class="suggestions"></div>

          <div class="form-grid">
            <div>
              <label>放送回</label>
              <select id="episodeSelect"></select>
            </div>
            <div>
              <label>評価</label>
              <select id="rating">
                <option value="5">★★★★★ 神回</option>
                <option value="4">★★★★☆ 面白い</option>
                <option value="3">★★★☆☆ 普通</option>
                <option value="2">★★☆☆☆ 微妙</option>
                <option value="1">★☆☆☆☆ きつい</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div>
              <label>ネタバレ</label>
              <select id="spoiler">
                <option value="false">ネタバレなし</option>
                <option value="true">ネタバレあり</option>
              </select>
            </div>
            <div>
              <label>タグ</label>
              <select id="tag">
                <option value="神回">神回</option>
                <option value="笑った">笑った</option>
                <option value="泣けた">泣けた</option>
                <option value="考えさせられた">考えさせられた</option>
                <option value="演出が良い">演出が良い</option>
                <option value="出演者が良い">出演者が良い</option>
                <option value="惜しい">惜しい</option>
              </select>
            </div>
          </div>

          <label>感想</label>
          <textarea id="comment" placeholder="この放送回の感想を書いてください"></textarea>

          <button class="primary-button" id="submitReview">投稿する</button>
        </div>

        <aside class="card">
          <h2>選べる番組候補</h2>
          <div id="programCandidates" class="program-list"></div>
        </aside>
      </div>
    </section>

    <section class="view hidden" id="view-reviews">
      <div class="card">
        <div class="section-head">
          <h2>最新口コミ</h2>
          <span>ネタバレはタップで表示</span>
        </div>
        <input id="reviewFilter" placeholder="番組名・局名・タグで検索" />
        <div id="reviewsList"></div>
      </div>
    </section>

    <section class="view hidden" id="view-ranking">
      <div class="layout">
        <div class="card">
          <h2>神回ランキング</h2>
          <div id="bestRanking"></div>
        </div>
        <div class="card">
          <h2>急上昇ランキング</h2>
          <div id="risingRanking"></div>
        </div>
        <div class="card">
          <h2>いいねランキング</h2>
          <div id="likeRanking"></div>
        </div>
        <div class="card">
          <h2>口コミ数ランキング</h2>
          <div id="countRankingFull"></div>
        </div>
      </div>
    </section>

    <section class="view hidden" id="view-admin">
      <div class="card">
        <div class="section-head">
          <h2>番組候補に追加</h2>
          <span>候補化して表記ゆれ防止</span>
        </div>

        <div class="form-grid">
          <div>
            <label>番組名</label>
            <input id="newTitle" placeholder="例：新番組名" />
          </div>
          <div>
            <label>系列・局</label>
            <input id="newStation" placeholder="例：TBS系 / 日本テレビ系" />
          </div>
        </div>

        <div class="form-grid">
          <div>
            <label>ジャンル</label>
            <input id="newGenre" placeholder="例：バラエティ" />
          </div>
          <div>
            <label>放送時刻</label>
            <input id="newTime" placeholder="例：20:00" />
          </div>
        </div>

        <label>放送回タイトル</label>
        <input id="newEpisodeTitle" placeholder="例：6/25放送回" />

        <button class="primary-button" id="addProgram">番組候補に追加</button>
      </div>

      <div class="card">
        <h2>現在の番組マスター</h2>
        <div id="masterList" class="program-list"></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="bottom-tab active" data-view="schedule">📺<br>番組</button>
    <button class="bottom-tab" data-view="post">✍️<br>投稿</button>
    <button class="bottom-tab" data-view="reviews">💬<br>口コミ</button>
    <button class="bottom-tab" data-view="ranking">🏆<br>順位</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
